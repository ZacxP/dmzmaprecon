<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MapDMZ Recon | Sistema Táctico</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root {
            --accent: #3b82f6;
            --bg-body: #020617;
            --panel-bg: rgba(15, 23, 42, 0.95);
        }

        body {
            background-color: var(--bg-body);
            color: #f8fafc;
            margin: 0;
            height: 100vh;
            overflow: hidden;
            font-family: ui-sans-serif, system-ui, -apple-system, sans-serif;
        }

        #viewport {
            width: 100vw;
            height: 100vh;
            cursor: grab;
            overflow: hidden;
            position: relative;
            touch-action: none;
        }

        /* Contenedor del mapa (4x4 piezas de 512px = 2048px) */
        #map-grid {
            position: absolute;
            display: grid;
            grid-template-columns: repeat(4, 512px); 
            gap: 0;
            transform-origin: 0 0;
            background: #000;
        }

        .map-tile {
            width: 512px;
            height: 512px;
            display: block;
            pointer-events: none;
            user-select: none;
        }

        /* Icono de Marcador */
        .marker {
            position: absolute;
            width: 40px;
            height: 40px;
            cursor: pointer;
            z-index: 100;
            filter: drop-shadow(0 4px 8px rgba(0,0,0,0.6));
            transition: transform 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .marker:hover { transform: scale(1.3) translateY(-5px); }

        /* UI Flotante */
        .ui-element {
            position: fixed;
            z-index: 1000;
            pointer-events: auto;
            backdrop-filter: blur(10px);
        }

        .info-card {
            bottom: 24px;
            left: 50%;
            transform: translateX(-50%);
            width: 90%;
            max-width: 400px;
            background: var(--panel-bg);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 20px;
            padding: 20px;
            display: none;
            box-shadow: 0 20px 50px rgba(0,0,0,0.8);
        }

        .btn-control {
            background: var(--panel-bg);
            color: white;
            width: 50px;
            height: 50px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            border: 1px solid rgba(255,255,255,0.1);
            margin-bottom: 8px;
        }

        .btn-control:active { background: var(--accent); }
    </style>
</head>
<body>

    <div id="viewport">
        <div id="map-grid">
            <!-- Las piezas se inyectan mediante JS -->
        </div>
    </div>

    <!-- UI Superior Derecha -->
    <div class="ui-element top-6 right-6 flex items-center gap-3 bg-slate-900/80 p-2 pr-6 rounded-full border border-white/10">
        <div class="w-8 h-8 bg-blue-600 rounded-full flex items-center justify-center animate-pulse">📡</div>
        <div class="text-right">
            <h1 class="text-[10px] font-black uppercase tracking-widest text-blue-400">MapDMZ Recon</h1>
            <p id="coord-info" class="text-[9px] font-mono text-slate-500">CONEXIÓN ACTIVA</p>
        </div>
    </div>

    <!-- Controles -->
    <div class="ui-element left-6 bottom-6 flex flex-col">
        <button class="btn-control" onclick="zoom(0.2)">+</button>
        <button class="btn-control" onclick="zoom(-0.2)">-</button>
        <button class="btn-control" onclick="resetView()">🎯</button>
    </div>

    <!-- Panel de Información -->
    <div id="info-panel" class="ui-element info-card">
        <div class="flex justify-between items-start mb-2">
            <h2 id="info-title" class="text-xl font-bold text-white italic">Punto de Interés</h2>
            <button onclick="closeInfo()" class="text-slate-500">✕</button>
        </div>
        <p id="info-desc" class="text-slate-300 text-sm leading-snug"></p>
    </div>

    <script>
        /**
         * RUTA BASADA EN TU ESTRUCTURA:
         * Carpeta: MapDmzRecon -> Carpeta: tiles
         */
        const pathPrefix = "MapDmzRecon/tiles/"; 
        const tiles = [
            "L1C1.webp", "L1C2.webp", "L1C3.webp", "L1C4.webp",
            "L2C1.webp", "L2C2.webp", "L2C3.webp", "L2C4.webp",
            "L3C1.webp", "L3C2.webp", "L3C3.webp", "L3C4.webp",
            "L4C1.webp", "L4C2.webp", "L4C3.webp", "L4C4.webp"
        ];

        // Puedes editar estas coordenadas (de 0 a 2048)
        const markers = [
            { x: 450, y: 380, title: "Torre Al-Mazrah", desc: "Punto elevado con visión térmica disponible." },
            { x: 1250, y: 1100, title: "Suministros Médicos", desc: "Contenedor con auto-reanimación y estimulantes." },
            { x: 1700, y: 1600, title: "Extracción", desc: "Punto de evacuación final. ¡Cuidado con los emboscadores!" }
        ];

        let scale = 0.5;
        let posX = 0;
        let posY = 0;
        const grid = document.getElementById('map-grid');
        const viewport = document.getElementById('viewport');

        function init() {
            // Cargar Piezas del Mapa
            tiles.forEach(filename => {
                const img = document.createElement('img');
                img.src = pathPrefix + filename; 
                img.className = 'map-tile';
                img.onerror = () => { console.error("Error cargando:", pathPrefix + filename); };
                grid.appendChild(img);
            });

            // Cargar Marcadores
            markers.forEach(m => {
                const pin = document.createElement('div');
                pin.className = 'marker';
                pin.style.left = `${m.x}px`;
                pin.style.top = `${m.y}px`;
                pin.innerHTML = `
                    <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <path d="M12 21C16 17.5 19 14.4087 19 10.3125C19 6.2721 15.866 3 12 3C8.13401 3 5 6.2721 5 10.3125C5 14.4087 8 17.5 12 21Z" fill="#3b82f6" stroke="white" stroke-width="2"/>
                        <circle cx="12" cy="10" r="3" fill="white"/>
                    </svg>`;
                pin.onclick = (e) => { e.stopPropagation(); openInfo(m); };
                grid.appendChild(pin);
            });

            resetView();
        }

        // Lógica de Movimiento
        let isDragging = false;
        let lastX, lastY;

        const startMove = (ex, ey) => {
            isDragging = true;
            lastX = ex; lastY = ey;
            viewport.style.cursor = 'grabbing';
        };

        const onMove = (ex, ey) => {
            if (!isDragging) return;
            posX += ex - lastX;
            posY += ey - lastY;
            lastX = ex; lastY = ey;
            update();
        };

        viewport.onmousedown = (e) => startMove(e.clientX, e.clientY);
        window.onmousemove = (e) => onMove(e.clientX, e.clientY);
        window.onmouseup = () => { isDragging = false; viewport.style.cursor = 'grab'; };

        viewport.ontouchstart = (e) => startMove(e.touches[0].clientX, e.touches[0].clientY);
        viewport.ontouchmove = (e) => onMove(e.touches[0].clientX, e.touches[0].clientY);
        viewport.ontouchend = () => isDragging = false;

        function zoom(amt) {
            scale = Math.min(Math.max(0.2, scale + amt), 1.5);
            update();
        }

        function resetView() {
            const mapSize = 2048 * scale;
            posX = (window.innerWidth - mapSize) / 2;
            posY = (window.innerHeight - mapSize) / 2;
            update();
        }

        function update() {
            grid.style.transform = `translate(${posX}px, ${posY}px) scale(${scale})`;
        }

        function openInfo(m) {
            document.getElementById('info-title').innerText = m.title;
            document.getElementById('info-desc').innerText = m.desc;
            document.getElementById('info-panel').style.display = 'block';
        }

        function closeInfo() {
            document.getElementById('info-panel').style.display = 'none';
        }

        init();
    </script>
</body>
</html>
